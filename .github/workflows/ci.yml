name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - run: pip install ruff==0.15.15

      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - run: pip install -r requirements-ci.txt

      - run: >-
          pytest
          --cov=config/spark/jobs
          --cov=scripts
          --cov=databricks/src/common.py
          --cov-report=term-missing
          --cov-fail-under=80

  bundle:
    # Validates the Databricks Asset Bundle. The validate step runs only when the
    # DATABRICKS_HOST / DATABRICKS_TOKEN repo secrets are set, so the job stays
    # green out-of-the-box and becomes a real check once you add credentials.
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle
        if: env.DATABRICKS_HOST != ''
        working-directory: databricks
        run: databricks bundle validate -t dev

  terraform:
    # Formats + validates the Databricks governance Terraform. `validate` needs
    # only the provider (downloaded by `init -backend=false`), no credentials, so
    # the job is a real check out-of-the-box.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform/databricks fmt -check -recursive

      - name: Terraform init + validate
        run: |
          terraform -chdir=infra/terraform/databricks init -backend=false
          terraform -chdir=infra/terraform/databricks validate
