services:
  postgres:
    image: postgres:15
    container_name: dp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dp-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft single-node (combined broker + controller) — no Zookeeper.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Fixed cluster id => deterministic KRaft storage format, stable across restarts.
      CLUSTER_ID: Bvzmkif0S7ehFtrGJm7aLQ
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  kafka-connect:
    image: debezium/connect:2.6
    container_name: dp-kafka-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 5s
      retries: 20

  namenode:
    image: apache/hadoop:3
    container_name: dp-namenode
    hostname: namenode
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
          hdfs namenode -format -force -nonInteractive;
        fi;
        hdfs namenode
    user: "0:0"
    environment:
      ENSURE_NAMENODE_DIR: /tmp/hadoop-root/dfs/name
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/tmp/hadoop-root/dfs/name
      - ./config/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://namenode:9870/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  datanode:
    image: apache/hadoop:3
    container_name: dp-datanode
    hostname: datanode
    restart: unless-stopped
    depends_on:
      namenode:
        condition: service_healthy
    command: ["hdfs", "datanode"]
    user: "0:0"
    environment:
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/tmp/hadoop-root/dfs/data
      - ./config/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://datanode:9864/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  metastore-db:
    image: postgres:15
    container_name: dp-metastore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${METASTORE_DB}
      POSTGRES_USER: ${METASTORE_USER}
      POSTGRES_PASSWORD: ${METASTORE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - metastore_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METASTORE_USER} -d ${METASTORE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: dp-hive-metastore
    restart: unless-stopped
    depends_on:
      metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=${METASTORE_USER}
        -Djavax.jdo.option.ConnectionPassword=${METASTORE_PASSWORD}
    volumes:
      - ./config/hive-metastore/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./config/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./drivers/postgresql-42.7.5.jar:/opt/hive/lib/postgresql-42.7.5.jar

  trino:
    image: trinodb/trino:477
    container_name: dp-trino
    restart: unless-stopped
    user: "0:0"
    depends_on:
      - hive-metastore
    ports:
      - "8080:8080"
    volumes:
      - ./config/trino/etc:/etc/trino
      - ./config/trino/catalog:/etc/trino/catalog
      - .:/opt/project
      - trino_data:/var/trino/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  spark:
    image: spark:3.5.8-python3
    container_name: dp-spark
    hostname: spark
    restart: unless-stopped
    user: "0:0"
    entrypoint: ["/bin/bash", "-lc", "while true; do sleep 3600; done"]
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf
    ports:
      - "4040:4040"
    volumes:
      - .:/opt/project
      - ./config/hadoop/core-site.xml:/opt/spark/conf/core-site.xml
      - ./config/hadoop/hdfs-site.xml:/opt/spark/conf/hdfs-site.xml

  metabase:
    image: metabase/metabase:v0.55.8
    container_name: dp-metabase
    restart: unless-stopped
    depends_on:
      - trino
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: dp-statsd-exporter
    restart: unless-stopped
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    volumes:
      - ./config/statsd/mapping.yml:/etc/statsd/mapping.yml
    command: --statsd.mapping-config=/etc/statsd/mapping.yml

  trino-exporter:
    build:
      context: ./config/trino-exporter
    container_name: dp-trino-exporter
    restart: unless-stopped
    depends_on:
      trino:
        condition: service_healthy
    ports:
      - "9104:8000"

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: dp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.6.1
    container_name: dp-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      prometheus:
        condition: service_started
      trino:
        # Wait until Trino is query-ready, otherwise the provisioned Trino
        # datasource is unreachable on a cold `up` and its health check fails.
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GF_INSTALL_PLUGINS: trino-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards

  airflow-postgres:
    image: postgres:15
    container_name: dp-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIRFLOW_DB}
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_USER} -d ${AIRFLOW_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: ./config/airflow/Dockerfile
    container_name: dp-airflow-init
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USERNAME} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Data --lastname Engineer --role Admin --email admin@example.com
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
      - ./sql:/opt/airflow/sql
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    build:
      context: .
      dockerfile: ./config/airflow/Dockerfile
    container_name: dp-airflow-webserver
    restart: unless-stopped
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8088:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_CONN_SOURCE_POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
      - ./sql:/opt/airflow/sql
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./config/airflow/Dockerfile
    container_name: dp-airflow-scheduler
    restart: unless-stopped
    user: "0:0"
    depends_on:
      airflow-webserver:
        condition: service_healthy
      spark:
        condition: service_started
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_SOURCE_POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./config:/opt/airflow/config
      - ./sql:/opt/airflow/sql
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  namenode_data:
  datanode_data:
  metastore_db_data:
  metabase_data:
  grafana_data:
  trino_data:
  kafka_data:
