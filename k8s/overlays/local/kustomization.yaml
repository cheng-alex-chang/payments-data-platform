apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: local-runtime-notes
    namespace: data-pipeline
    literals:
      - runtime=kind
      - warehouse=hdfs://namenode:9000/warehouse
      - kafkaBootstrap=kafka:29092

# Passwords come from secrets.env (gitignored; copy secrets.env.example and edit).
# Only non-secret identifiers stay as committed literals -- no credentials in git,
# matching the Compose .env / .env.example pattern.
secretGenerator:
  - name: platform-secrets
    namespace: data-pipeline
    literals:
      - POSTGRES_DB=payments
      - POSTGRES_USER=dataeng
      - METASTORE_DB=metastore
      - METASTORE_USER=hive
      - AIRFLOW_DB=airflow
      - AIRFLOW_USER=airflow
      - AIRFLOW_ADMIN_USERNAME=admin
    envs:
      - secrets.env
