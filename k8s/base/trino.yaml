apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/component: query
spec:
  selector:
    app.kubernetes.io/name: trino
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/component: query
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trino
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trino
        app.kubernetes.io/component: query
    spec:
      containers:
        - name: trino
          image: trinodb/trino:477
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: trino-etc
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: trino-etc
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: trino-etc
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: trino-catalog
              mountPath: /etc/trino/catalog
            - name: hadoop-config
              mountPath: /etc/hadoop/conf
            - name: trino-data
              mountPath: /var/trino/data
      volumes:
        - name: trino-etc
          configMap:
            name: trino-etc
        - name: trino-catalog
          configMap:
            name: trino-catalog
        - name: hadoop-config
          configMap:
            name: hadoop-config
        - name: trino-data
          emptyDir: {}
