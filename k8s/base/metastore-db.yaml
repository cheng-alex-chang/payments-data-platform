apiVersion: v1
kind: Service
metadata:
  name: metastore-db
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: metastore-db
    app.kubernetes.io/component: catalog-database
spec:
  selector:
    app.kubernetes.io/name: metastore-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metastore-db
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: metastore-db
    app.kubernetes.io/component: catalog-database
spec:
  serviceName: metastore-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metastore-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metastore-db
        app.kubernetes.io/component: catalog-database
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: METASTORE_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: METASTORE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: METASTORE_PASSWORD
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: metastore-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: metastore-db-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
