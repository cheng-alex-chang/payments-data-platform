apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: metabase
    app.kubernetes.io/component: analytics-ui
spec:
  selector:
    app.kubernetes.io/name: metabase
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: metabase
    app.kubernetes.io/component: analytics-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
        app.kubernetes.io/component: analytics-ui
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.55.8
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MB_DB_FILE
              value: /metabase-data/metabase.db
            - name: JAVA_TOOL_OPTIONS
              value: -Xmx384m
          volumeMounts:
            - name: metabase-data
              mountPath: /metabase-data
      volumes:
        - name: metabase-data
          emptyDir: {}
