apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: messaging
spec:
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: broker
      port: 29092
      targetPort: broker
    - name: controller
      port: 9093
      targetPort: controller
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: messaging
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: messaging
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          ports:
            - name: broker
              containerPort: 29092
            - name: controller
              containerPort: 9093
          env:
            # KRaft single-node (combined broker + controller) — no Zookeeper.
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka:9093
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:29092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            # Fixed cluster id makes KRaft storage formatting deterministic, so the
            # broker id never drifts across restarts (the old Zookeeper failure mode).
            - name: CLUSTER_ID
              value: Bvzmkif0S7ehFtrGJm7aLQ
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_HEAP_OPTS
              value: -Xms128m -Xmx384m
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -lc
                - kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-connect
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: kafka-connect
    app.kubernetes.io/component: messaging
spec:
  selector:
    app.kubernetes.io/name: kafka-connect
  ports:
    - name: http
      port: 8083
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-connect
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: kafka-connect
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-connect
        app.kubernetes.io/component: messaging
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka-connect
          image: debezium/connect:2.6
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: GROUP_ID
              value: connect-cluster
            - name: CONFIG_STORAGE_TOPIC
              value: connect_configs
            - name: OFFSET_STORAGE_TOPIC
              value: connect_offsets
            - name: STATUS_STORAGE_TOPIC
              value: connect_statuses
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: kafka-connect
            - name: KAFKA_HEAP_OPTS
              value: -Xms128m -Xmx384m
          readinessProbe:
            httpGet:
              path: /connectors
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-postgres-cdc
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: register-postgres-cdc
    app.kubernetes.io/component: messaging
spec:
  suspend: true
  template:
    metadata:
      labels:
        app.kubernetes.io/name: register-postgres-cdc
        app.kubernetes.io/component: messaging
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: python:3.11-slim
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
          command:
            - python
            - -c
            - |
              import json
              import os
              import time
              import urllib.error
              import urllib.request

              with open("/etc/kafka-connect/postgres-cdc.json", encoding="utf-8") as handle:
                  payload = json.load(handle)

              payload["config"]["database.user"] = os.environ["POSTGRES_USER"]
              payload["config"]["database.password"] = os.environ["POSTGRES_PASSWORD"]

              base_url = "http://kafka-connect:8083/connectors"
              headers = {"Content-Type": "application/json"}
              deadline = time.time() + 120

              def request_json(url, data, method):
                  req = urllib.request.Request(url, data=json.dumps(data).encode(), headers=headers, method=method)
                  return urllib.request.urlopen(req, timeout=5).read()

              def register():
                  try:
                      request_json(f"{base_url}/{payload['name']}/config", payload["config"], "PUT")
                      return
                  except urllib.error.HTTPError as exc:
                      if exc.code != 404:
                          raise
                  try:
                      request_json(base_url, payload, "POST")
                  except urllib.error.HTTPError as create_exc:
                      if create_exc.code == 409:
                          request_json(f"{base_url}/{payload['name']}/config", payload["config"], "PUT")
                      else:
                          raise

              while time.time() < deadline:
                  try:
                      register()
                      break
                  except Exception:
                      time.sleep(5)
              else:
                  raise SystemExit("Kafka Connect was not ready")
          volumeMounts:
            - name: connector-config
              mountPath: /etc/kafka-connect
      volumes:
        - name: connector-config
          configMap:
            name: kafka-connect-config
