apiVersion: v1
kind: Service
metadata:
  name: namenode
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: namenode
    app.kubernetes.io/component: hdfs
spec:
  selector:
    app.kubernetes.io/name: namenode
  ports:
    - name: rpc
      port: 9000
      targetPort: rpc
    - name: http
      port: 9870
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: namenode
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: namenode
    app.kubernetes.io/component: hdfs
spec:
  serviceName: namenode
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: namenode
  template:
    metadata:
      labels:
        app.kubernetes.io/name: namenode
        app.kubernetes.io/component: hdfs
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: namenode
          image: apache/hadoop:3
          command:
            - /bin/bash
            - -lc
            - |
              if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
                hdfs namenode -format -force -nonInteractive
              fi
              hdfs namenode
          ports:
            - name: rpc
              containerPort: 9000
            - name: http
              containerPort: 9870
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: namenode-data
              mountPath: /tmp/hadoop-root/dfs/name
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              subPath: hdfs-site.xml
      volumes:
        - name: hadoop-config
          configMap:
            name: hadoop-config
  volumeClaimTemplates:
    - metadata:
        name: namenode-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: datanode
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: datanode
    app.kubernetes.io/component: hdfs
spec:
  selector:
    app.kubernetes.io/name: datanode
  ports:
    - name: http
      port: 9864
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datanode
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: datanode
    app.kubernetes.io/component: hdfs
spec:
  serviceName: datanode
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: datanode
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datanode
        app.kubernetes.io/component: hdfs
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: datanode
          image: apache/hadoop:3
          command:
            - hdfs
            - datanode
          ports:
            - name: http
              containerPort: 9864
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: datanode-data
              mountPath: /tmp/hadoop-root/dfs/data
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              subPath: hdfs-site.xml
      volumes:
        - name: hadoop-config
          configMap:
            name: hadoop-config
  volumeClaimTemplates:
    - metadata:
        name: datanode-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hdfs-init
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: hdfs-init
    app.kubernetes.io/component: hdfs
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hdfs-init
        app.kubernetes.io/component: hdfs
    spec:
      restartPolicy: OnFailure
      containers:
        - name: hdfs-init
          image: apache/hadoop:3
          env:
            - name: HADOOP_USER_NAME
              value: root
          command:
            - /bin/bash
            - -lc
            - |
              until hdfs dfs -ls / >/dev/null 2>&1; do
                sleep 2
              done
              until hdfs dfsadmin -report 2>/dev/null | grep -q "Live datanodes ([1-9]"; do
                sleep 2
              done
              hdfs dfs -mkdir -p /warehouse/analytics.db /checkpoints/bronze /checkpoints/silver /checkpoints/gold
              hdfs dfs -chmod 777 /warehouse /warehouse/analytics.db /checkpoints /checkpoints/bronze /checkpoints/silver /checkpoints/gold
          volumeMounts:
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              subPath: hdfs-site.xml
      volumes:
        - name: hadoop-config
          configMap:
            name: hadoop-config
