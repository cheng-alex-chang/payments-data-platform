apiVersion: v1
kind: Service
metadata:
  name: statsd-exporter
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: statsd-exporter
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: statsd-exporter
  ports:
    - name: statsd
      port: 9125
      targetPort: statsd
      protocol: UDP
    - name: metrics
      port: 9102
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statsd-exporter
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: statsd-exporter
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: statsd-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: statsd-exporter
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: statsd-exporter
          image: prom/statsd-exporter:latest
          args:
            - --statsd.mapping-config=/etc/statsd/mapping.yml
          ports:
            - name: statsd
              containerPort: 9125
              protocol: UDP
            - name: metrics
              containerPort: 9102
          volumeMounts:
            - name: statsd-config
              mountPath: /etc/statsd/mapping.yml
              subPath: mapping.yml
      volumes:
        - name: statsd-config
          configMap:
            name: statsd-config
---
apiVersion: v1
kind: Service
metadata:
  name: trino-exporter
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: trino-exporter
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: trino-exporter
  ports:
    - name: metrics
      port: 8000
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino-exporter
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: trino-exporter
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trino-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trino-exporter
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: trino-exporter
          image: local/trino-exporter:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.3.1
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: observability
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.1
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-data
          emptyDir: {}
