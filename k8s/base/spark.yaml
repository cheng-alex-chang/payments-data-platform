apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: spark
    app.kubernetes.io/component: processing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-job-runner
  namespace: data-pipeline
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - create
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-job-runner
  namespace: data-pipeline
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: data-pipeline
roleRef:
  kind: Role
  name: spark-job-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-bronze
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: spark-bronze
    app.kubernetes.io/component: processing
spec:
  suspend: true
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-bronze
        app.kubernetes.io/component: processing
    spec:
      serviceAccountName: spark
      restartPolicy: Never
      containers:
        - name: spark
          image: spark:3.5.8-python3
          command:
            - /opt/spark/bin/spark-submit
            - --master
            - local[*]
            - --conf
            - spark.jars.ivy=/tmp/.ivy2
            - --packages
            - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.8,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1
            - /opt/project/config/spark/jobs/bronze_from_kafka.py
          env:
            - name: HOME
              value: /tmp
            - name: HADOOP_CONF_DIR
              value: /opt/spark/conf
          volumeMounts:
            - name: spark-jobs
              mountPath: /opt/project/config/spark/jobs
            - name: hadoop-config
              mountPath: /opt/spark/conf/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/spark/conf/hdfs-site.xml
              subPath: hdfs-site.xml
      volumes:
        - name: spark-jobs
          configMap:
            name: spark-jobs
        - name: hadoop-config
          configMap:
            name: hadoop-config
