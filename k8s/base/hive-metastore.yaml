apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: hive-metastore
    app.kubernetes.io/component: catalog
spec:
  selector:
    app.kubernetes.io/name: hive-metastore
  ports:
    - name: thrift
      port: 9083
      targetPort: thrift
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: data-pipeline
  labels:
    app.kubernetes.io/name: hive-metastore
    app.kubernetes.io/component: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hive-metastore
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive-metastore
        app.kubernetes.io/component: catalog
    spec:
      containers:
        - name: hive-metastore
          image: local/hive-metastore:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: thrift
              containerPort: 9083
          env:
            - name: SERVICE_NAME
              value: metastore
            - name: DB_DRIVER
              value: postgres
            - name: METASTORE_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: METASTORE_USER
            - name: METASTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: METASTORE_PASSWORD
            - name: SERVICE_OPTS
              value: >-
                -Xmx384m
                -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
                -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
                -Djavax.jdo.option.ConnectionUserName=$(METASTORE_USER)
                -Djavax.jdo.option.ConnectionPassword=$(METASTORE_PASSWORD)
          readinessProbe:
            tcpSocket:
              port: thrift
            initialDelaySeconds: 45
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: thrift
            initialDelaySeconds: 90
            periodSeconds: 30
          volumeMounts:
            - name: hive-metastore-config
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              subPath: hdfs-site.xml
      volumes:
        - name: hive-metastore-config
          configMap:
            name: hive-metastore-config
        - name: hadoop-config
          configMap:
            name: hadoop-config
