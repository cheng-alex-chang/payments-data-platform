<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 400" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Snowflake FX ELT architecture</title>
  <desc>FX REST API and Postgres payments are staged to AWS S3, loaded into Snowflake RAW VARIANT tables with COPY INTO, transformed by SQL ELT into a USD-normalized fact and aggregate, orchestrated by Airflow and governed by Terraform.</desc>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="1159" height="399" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="36" y="46" font-size="22" font-weight="700" fill="#0f172a">Snowflake FX ELT</text>
  <text x="36" y="70" font-size="13" fill="#64748b">Batch pipeline &#8212; FX rates + payments, normalized to USD in Snowflake</text>

  <rect x="36" y="120" width="150" height="52" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="111" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">FX REST API</text>
  <text x="111" y="159" text-anchor="middle" font-size="11" fill="#64748b">ECB daily rates</text>

  <rect x="36" y="196" width="150" height="52" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="111" y="218" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">Postgres</text>
  <text x="111" y="235" text-anchor="middle" font-size="11" fill="#64748b">payments (50k)</text>

  <rect x="250" y="150" width="150" height="66" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="325" y="180" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">AWS S3</text>
  <text x="325" y="198" text-anchor="middle" font-size="11" fill="#64748b">partitioned JSON</text>

  <rect x="462" y="150" width="150" height="66" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="537" y="180" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Snowflake RAW</text>
  <text x="537" y="198" text-anchor="middle" font-size="11" fill="#64748b">COPY INTO &#183; VARIANT</text>

  <rect x="674" y="150" width="150" height="66" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="749" y="180" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">SQL ELT</text>
  <text x="749" y="198" text-anchor="middle" font-size="11" fill="#64748b">dim &#183; fct &#183; agg</text>

  <rect x="886" y="150" width="160" height="66" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
  <text x="966" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">USD analytics</text>
  <text x="966" y="198" text-anchor="middle" font-size="11" fill="#3b5ba5">cross-currency</text>

  <line x1="186" y1="146" x2="246" y2="176" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="186" y1="222" x2="246" y2="192" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="400" y1="183" x2="458" y2="183" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="612" y1="183" x2="670" y2="183" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="824" y1="183" x2="882" y2="183" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="430" y="174" text-anchor="middle" font-size="10.5" fill="#94a3b8">COPY</text>

  <text x="250" y="260" font-size="12" fill="#64748b">Forward-filled FX dimension &#183; LEFT-join USD fact &#183; validation gates reconcile 50,004 == 50,004</text>

  <rect x="36" y="300" width="1010" height="62" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="541" y="326" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">Airflow orchestration &#8212; TaskFlow @task + SnowflakeOperator</text>
  <text x="541" y="346" text-anchor="middle" font-size="12" fill="#64748b">Terraform governance &#8212; S3&#8211;Snowflake storage integration &#183; warehouse &#183; role/grants</text>
</svg>
