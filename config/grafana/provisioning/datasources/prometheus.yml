apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Payments Postgres
    type: postgres
    uid: payments-postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      postgresVersion: 1500
      sslmode: disable

  - name: Payments Gold (Trino)
    type: trino-datasource
    uid: payments-gold-trino
    access: proxy
    url: http://trino:8080
    jsonData:
      # Local Trino runs without auth; this just sets the X-Trino-User header
      # (same convention as the trino-exporter sidecar).
      user: admin
